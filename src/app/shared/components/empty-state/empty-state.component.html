<div class="empty-state">
  <i [class]="icon()" class="empty-icon"></i>
  <h3 class="empty-message">{{ message() | translate }}</h3>
  @if (description()) {
    <p class="empty-description">{{ description() | translate }}</p>
  }
  <div class="empty-actions">
    <ng-content></ng-content>
  </div>
</div>
